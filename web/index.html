<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitCamp 打卡</title>
  <!-- 使用本地 node_modules 中的 ethers，不依赖 CDN -->
  <script src="/vendor/ethers.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 24px auto; padding: 0 16px; }
    h1 { font-size: 1.25rem; }
    section { margin: 16px 0; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
    label { display: block; margin-bottom: 4px; font-weight: 600; }
    select, button { padding: 8px 12px; margin: 0; font-size: 14px; }
    button { min-width: 160px; width: 160px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 12px; }
    .btn-row button { flex: 0 0 auto; }
    .info { font-size: 13px; color: #555; margin: 8px 0; }
    .error { color: #c00; }
    .success { color: #080; }
  </style>
</head>
<body>
  <h1>FitCamp 打卡</h1>

  <section>
    <label>当前用户</label>
    <div id="userSelectWrap">
      <select id="userSelect">
        <option value="K">群主 owner</option>
        <option value="A">会员 Alice</option>
        <option value="B">会员 Bob</option>
        <option value="C">会员 Carol</option>
        <option value="D">会员 David</option>
      </select>
    </div>
    <div id="connectWalletWrap" style="display:none">
      <button id="btnConnectWallet">连接钱包 (Base Sepolia)</button>
      <span id="connectedAddress" class="info" style="margin-left:8px"></span>
    </div>
  </section>

  <section id="kPanel">
    <label>群主操作</label>
    <div class="btn-row">
      <button id="btnNewRound">新建 FitCamp</button>
      <label for="newRoundDuration" style="font-weight:normal;margin:0">下一期天数</label>
      <select id="newRoundDuration">
        <option value="1">1 天</option>
        <option value="7" selected>7 天</option>
        <option value="28">28 天</option>
      </select>
      <span id="currentRoundLabel" class="info" style="margin:0">当前：第 1 期</span>
    </div>
    <div class="btn-row">
      <button id="btnStart">开始打卡</button>
      <button id="btnEnd">结束打卡</button>
    </div>
    <div id="participantInfo" class="info" style="white-space:pre-wrap;margin-top:0"></div>
    <div id="settlementResult" class="info" style="white-space:pre-wrap"></div>
    <div class="btn-row">
      <button id="btnWithdrawDust">群主提现</button>
      <span id="withdrawDustTip" class="info" style="margin:0;font-size:12px;color:#888">不提现则本期余额自动滚入下一期奖金池</span>
    </div>
    <div id="campPoolBalance" class="info" style="margin-top:6px">目前奖金池总金额：—</div>
  </section>

  <section id="userPanel">
    <label>用户操作</label>
    <div class="btn-row">
      <button id="btnJoin">缴纳打卡定金</button>
      <button id="btnCheckIn">打卡</button>
      <button id="btnWithdraw">提现</button>
    </div>
  </section>

  <section id="myFitNFTSection">
    <label>我的 Fit NFT</label>
    <div id="myFitNFTList" class="info">—</div>
    <p id="myFitNFTTip" style="font-size:12px;color:#888;margin-top:4px;"></p>
  </section>

  <section>
    <label>当前状态</label>
    <div id="status" class="info">加载中…</div>
    <div id="tx" class="info"></div>
  </section>

  <script src="app.js"></script>
  <p style="font-size:12px;color:#888;">若控制台出现 MetaMask/Rabby 的 ethereum 冲突提示，可忽略（本页使用本地链，不依赖钱包插件）。</p>
</body>
</html>
