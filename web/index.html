<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitCamp 打卡</title>
  <script src="/vendor/ethers.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #1a1a1a;
      margin: 0;
      min-height: 100vh;
    }

    .dapp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
      flex-wrap: wrap;
      gap: 12px;
    }
    .dapp-brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1a1a1a;
    }
    .dapp-chain {
      font-size: 12px;
      color: #6b7280;
      background: #f3f4f6;
      padding: 6px 10px;
      border-radius: 999px;
    }
    .dapp-wallet {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .dapp-wallet select { padding: 8px 12px; font-size: 14px; border-radius: 8px; border: 1px solid #e5e7eb; }
    .dapp-wallet .info { font-size: 12px; color: #6b7280; margin: 0; }

    .dapp-main {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .card .btn-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .card .btn-row:last-child { margin-bottom: 0; }
    .card button {
      padding: 10px 16px;
      font-size: 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      min-width: 120px;
    }
    .card button:disabled { opacity: 0.5; cursor: not-allowed; }
    .card button.primary {
      background: #0d9488;
      color: #fff;
    }
    .card button.primary:hover:not(:disabled) { background: #0f766e; }
    .card button.secondary {
      background: #f3f4f6;
      color: #374151;
    }
    .card button.secondary:hover:not(:disabled) { background: #e5e7eb; }
    .card .info {
      font-size: 13px;
      color: #6b7280;
      margin: 8px 0;
      line-height: 1.5;
    }
    .card .error { color: #dc2626; }
    .card .success { color: #059669; }

    #currentRoundLabel { font-size: 15px; font-weight: 500; color: #1a1a1a; margin: 0; }
    #participantInfo, #settlementResult { white-space: pre-wrap; font-size: 12px; }
    #withdrawDustTip, #campPoolBalance { font-size: 12px; color: #6b7280; margin: 4px 0 0 0; }
    #myFitNFTTip { font-size: 12px; color: #6b7280; margin: 4px 0 0 0; }

    .card-status .card-title { margin-bottom: 8px; }
    #status { margin: 0 0 8px 0; }
    #tx { margin: 0; font-size: 12px; color: #6b7280; }

    .dapp-footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <header class="dapp-header">
    <span class="dapp-brand">FitCamp</span>
    <span id="chainLabel" class="dapp-chain">Local · 31337</span>
    <div class="dapp-wallet">
      <div id="userSelectWrap">
        <select id="userSelect">
          <option value="K">群主 owner</option>
          <option value="A">会员 Alice</option>
          <option value="B">会员 Bob</option>
          <option value="C">会员 Carol</option>
          <option value="D">会员 David</option>
        </select>
      </div>
      <div id="localWalletWrap" style="display:none">
        <button id="btnConnectLocal" type="button" class="secondary" style="min-width:auto; padding:8px 12px;">连接钱包（模拟测试网）</button>
      </div>
      <div id="connectWalletWrap" style="display:none">
        <button id="btnConnectWallet" class="primary" style="min-width:auto; padding:8px 14px;">连接钱包</button>
        <span id="connectedAddress" class="info"></span>
        <button id="btnDisconnectLocal" type="button" class="secondary" style="display:none; min-width:auto; padding:8px 12px;">断开</button>
      </div>
    </div>
  </header>

  <main class="dapp-main">
    <section class="card" id="cardRound">
      <div class="card-title">当前期</div>
      <span id="currentRoundLabel">当前：第 1 期</span>
    </section>

    <section class="card" id="userPanel">
      <div class="card-title">我的参与</div>
      <div class="btn-row">
        <button id="btnJoin" class="primary">缴纳打卡定金</button>
        <button id="btnCheckIn" class="primary">打卡</button>
        <button id="btnWithdraw" class="primary">提现</button>
      </div>
    </section>

    <section class="card" id="kPanel">
      <div class="card-title">群主操作</div>
      <div class="btn-row">
        <button id="btnNewRound" class="primary">新建 FitCamp</button>
        <label for="newRoundDuration" style="font-weight:normal; margin:0; font-size:14px;">打卡天数</label>
        <select id="newRoundDuration">
          <option value="1">1 天</option>
          <option value="7" selected>7 天</option>
          <option value="28">28 天</option>
        </select>
      </div>
      <div class="btn-row">
        <button id="btnStart" class="primary">开始打卡</button>
        <button id="btnEnd" class="primary">结束打卡</button>
      </div>
      <div id="participantInfo" class="info"></div>
      <div id="settlementResult" class="info"></div>
      <div class="btn-row">
        <button id="btnWithdrawDust" class="secondary">群主提现</button>
        <span id="withdrawDustTip" class="info">不提现则本期余额自动滚入下一期奖金池</span>
      </div>
      <div id="campPoolBalance" class="info">目前奖金池总金额：—</div>
    </section>

    <section class="card" id="myFitNFTSection">
      <div class="card-title">我的 Fit NFT</div>
      <div id="myFitNFTList" class="info">—</div>
      <p id="myFitNFTTip"></p>
    </section>

    <section class="card card-status">
      <div class="card-title">当前状态</div>
      <div id="status" class="info">加载中…</div>
      <div id="tx" class="info"></div>
    </section>
  </main>

  <footer class="dapp-footer">
    若控制台出现 MetaMask/Rabby 的 ethereum 冲突提示，可忽略（本页使用本地链，不依赖钱包插件）。
  </footer>

  <script src="app.js"></script>
</body>
</html>
